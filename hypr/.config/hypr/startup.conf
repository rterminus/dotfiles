exec-once = hyprctl setcursor NotwaitaBlack 24
exec-once = xrandr --output HDMI-A-1 --primary

# wallpaper setup
exec-once = swww-daemon
exec-once = sleep 1 && swww img /home/terminus/Pictures/grdwpp.png

# hypridle
exec-once = hypridle

# Status Bar (Waybar)
exec-once = waybar

# Notification Daemon (Dunst)
exec-once = dunst

# Authentication Agent
exec-once = /usr/lib/polkit-kde-authentication-agent-1

# Clipboard Management
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# Network & Bluetooth Applets
exec-once = nm-applet --indicator
# exec-once = blueman-applet

# Screen Brightness (For laptop use)
exec-once = brightnessctl set 10%

exec-once = ~/dotfiles/bin/battery-notify.sh
exec-once = ~/dotfiles/bin/sunset.sh
