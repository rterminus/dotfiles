# ----------------------------------------------------- 
# Window Rules v2
# ----------------------------------------------------- 

# Transparency and Blur for specific apps
windowrulev2 = opacity 0.9 0.8, class:^(kitty)$

# Floating rules for small utility windows
windowrulev2 = float, class:^(pavucontrol)$
windowrulev2 = float, class:^(blueman-manager)$
windowrulev2 = float, class:^(nm-connection-editor)$

# Position the Rofi launcher (nuanced centerpiece)
windowrulev2 = center, class:^(Rofi)$

# Correct Zen Browser rule (removed invalid ignorealpha line)
windowrulev2 = opacity 1.0 override 1.0 override, class:^(app\.zen_browser\.zen)$

blurls = waybar
blurls = dunst
blurls = notifications
