decoration {
    screen_shader =

    rounding = 2

    active_opacity = 0.8
    inactive_opacity = 0.6

    fullscreen_opacity = 1.0

    blur {
        enabled = true
        size = 6
        passes = 2
        new_optimizations = true
        ignore_opacity = true
        xray = false
