        contrast = 0.9
        brightness = 0.8
        vibrancy = 0.1696
        vibrancy_darkness = 0.0
    }

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(0, 0, 0, 0.5)
    }
}
