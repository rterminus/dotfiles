general {
    gaps_in = 2
    gaps_out = 2
    border_size = 1

    col.active_border = rgba(444444ee) rgba(111111ee) 45deg
    col.inactive_border = rgba(111111ee)

    layout = dwindle
}

dwindle {
    preserve_split = yes
}

cursor {
    enable_hyprcursor = true
    sync_gsettings_theme = true
}

render {
    direct_scanout = false
}

misc {
    disable_hyprland_logo = true
    force_default_wallpaper = 0
}
