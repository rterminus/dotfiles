general {
    no_fade_in = false
    grace = 0
    disable_loading = true
}

background {
    monitor =
    # Nuanced Charcoal Background
    path = screenshot # Or a path to a specific nuanced wallpaper
    color = rgba(26, 26, 26, 1.0) 
    blur_passes = 3
    blur_size = 7
}

# Time
label {
    monitor =
    text = $TIME
    color = rgba(224, 224, 224, 1.0) # Soft White
    font_size = 90
    font_family = IosevkaTerm Nerd Font Bold
    position = 0, 80
    halign = center
    valign = center
}

# Date
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%A, %d %B")"
    color = rgba(160, 160, 160, 1.0) # Silver
    font_size = 24
    font_family = IosevkaTerm Nerd Font
    position = 0, -10
    halign = center
    valign = center
}

# Input Field
input-field {
    monitor =
    size = 250, 50
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true
    outer_color = rgba(51, 51, 51, 1.0) # Slate Gray
    inner_color = rgba(26, 26, 26, 1.0) # Charcoal
    font_color = rgba(224, 224, 224, 1.0) # Soft White
    fade_on_empty = true
    placeholder_text = <i>Password...</i>
    hide_input = false
    position = 0, -100
    halign = center
    valign = center
}
