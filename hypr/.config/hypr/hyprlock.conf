general {
    no_fade_in = false
    grace = 0
    disable_loading = true
}

background {
    monitor =
    path = screenshot
    color = rgba(26, 26, 26, 1.0) 
    blur_passes = 3
    blur_size = 7
}

label {
    monitor =
    text = $TIME
    color = rgba(224, 224, 224, 1.0)
    font_size = 90
    font_family = IosevkaTerm Nerd Font Bold
    position = 0, 80
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%A, %d %B" | tr '[:upper:]' '[:lower:]')"
    color = rgba(160, 160, 160, 1.0)
    font_size = 24
    font_family = IosevkaTerm Nerd Font
    position = 0, -10
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 250, 50
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true
    outer_color = rgba(68, 68, 68, 1.0)
    inner_color = rgba(17, 17, 17, 1.0)
    font_color = rgba(216, 216, 216, 1.0)
    fade_on_empty = true
    placeholder_text = <span font_family="IosevkaTerm Nerd Font" foreground="##666666">password: █</span>
    hide_input = false
    rounding = 2
    position = 0, -100
    halign = center
    valign = center
}
