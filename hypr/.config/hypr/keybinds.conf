# Main modifier
$mainMod = SUPER

# other variables
$screenshot = ~/dotfiles/bin/screenshot.sh
$move_all = ~/.config/hypr/scripts/move_all_windows.sh

# Applications
bind = $mainMod, Return, exec, kitty # open terminal
bind = $mainMod CONTROL, Return, exec, hyprctl dispatch exec "[float;size 800 500;center] kitty" # open floating terminal
bind = $mainMod, E, exec, hyprctl dispatch exec "[float;size 1280 720;center] kitty -e yazi" # open yazi file manager
bind = $mainMod, Space, exec, rofi -show drun -config ~/.config/rofi/config.rasi # open app launcher
bind = $mainMod SHIFT, Escape, exec, kitty -e btop # open system monitor

# Power Menu
bind = $mainMod, Escape, exec, ~/.config/rofi/powermenu.sh # open power menu

# Window management
bind = $mainMod, Q, killactive, # close active window
bind = $mainMod, F, fullscreen, # toggle fullscreen
bind = $mainMod SHIFT, F, togglefloating, # toggle floating mode
bind = $mainMod SHIFT, P, pseudo, # toggle pseudo tiling
bind = $mainMod, V, layoutmsg, togglesplit # toggle split direction
bind = $mainMod, Z, fullscreen, 1 # maximize window

# special workspace
bind = $mainMod, S, togglespecialworkspace, magic # toggle special workspace
bind = $mainMod SHIFT, S, movetoworkspace, special:magic # move window to special workspace

# Focus movement (HJKL)
bind = $mainMod, H, movefocus, l # move focus left
bind = $mainMod, L, movefocus, r # move focus right
bind = $mainMod, K, movefocus, u # move focus up
bind = $mainMod, J, movefocus, d # move focus down

# Window movement (HJKL)
bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, L, movewindow, r
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, J, movewindow, d

# Simple Resizing (Arrow keys)
binde = $mainMod, right, resizeactive, 20 0 # resize window right
binde = $mainMod, left, resizeactive, -20 0 # resize window left
binde = $mainMod, up, resizeactive, 0 -20 # resize window up
binde = $mainMod, down, resizeactive, 0 20 # resize window down

# Workspace switching
bind = $mainMod, 1, workspace, 1 # go to workspace 1
bind = $mainMod, 2, workspace, 2 # go to workspace 2
bind = $mainMod, 3, workspace, 3 # go to workspace 3
bind = $mainMod, 4, workspace, 4 # go to workspace 4
bind = $mainMod, 5, workspace, 5 # go to workspace 5
bind = $mainMod, 6, workspace, 6 # go to workspace 6
bind = $mainMod, 7, workspace, 7 # go to workspace 7
bind = $mainMod, 8, workspace, 8 # go to workspace 8
bind = $mainMod, 9, workspace, 9 # go to workspace 9

# Move window to workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1 # move window to workspace 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2 # move window to workspace 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3 # move window to workspace 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4 # move window to workspace 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5 # move window to workspace 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6 # move window to workspace 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7 # move window to workspace 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8 # move window to workspace 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9 # move window to workspace 9

# move all windows to workspace
bind = $mainMod ALT, 1, exec, $move_all 1 # move all windows to workspace 1
bind = $mainMod ALT, 2, exec, $move_all 2 # move all windows to workspace 2
bind = $mainMod ALT, 3, exec, $move_all 3 # move all windows to workspace 3
bind = $mainMod ALT, 4, exec, $move_all 4 # move all windows to workspace 4
bind = $mainMod ALT, 5, exec, $move_all 5 # move all windows to workspace 5
bind = $mainMod ALT, 6, exec, $move_all 6 # move all windows to workspace 6
bind = $mainMod ALT, 7, exec, $move_all 7 # move all windows to workspace 7
bind = $mainMod ALT, 8, exec, $move_all 8 # move all windows to workspace 8
bind = $mainMod ALT, 9, exec, $move_all 9 # move all windows to workspace 9

# Multimedia (Audio and Brightness)
bindle = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+ && ~/dotfiles/bin/volume-notify.sh # increase volume
bindle = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%- && ~/dotfiles/bin/volume-notify.sh # decrease volume
bindl  = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle && ~/dotfiles/bin/volume-notify.sh # toggle audio mute
bindle = , XF86MonBrightnessUp, exec, brightnessctl set 5%+ && ~/dotfiles/bin/brightness-notify.sh # increase brightness
bindle = , XF86MonBrightnessDown, exec, brightnessctl set 5%- && ~/dotfiles/bin/brightness-notify.sh # decrease brightness

# screenshot
bind = $mainMod, P, exec, $screenshot sf # take screenshot

# Reload Hyprland Configuration
bind = $mainMod, M, exec, hyprctl reload && pkill waybar; waybar & # reload hyprland and waybar

# open browser
bind = $mainMod, B, exec, zen-browser # open zen browser

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow # drag to move window
bindm = $mainMod, mouse:273, resizewindow # drag to resize window

# keybind navigator
bind = $mainMod SHIFT, slash, exec, ~/dotfiles/bin/keybinds.sh # open keybinds cheat sheet

# toggle waybar visibility
bind = $mainMod, W, exec, pkill waybar || waybar # toggle waybar visibility

# control center
bind = $mainMod CONTROL, W, exec, kitty --class floating_shell -e ~/.config/hypr/scripts/control_center.sh # open control center

# color picker
bind = $mainMod SHIFT, C, exec, ~/.config/hypr/scripts/color_picker.sh # open color picker
