[manager]
ratio          = [ 1, 3, 4 ]
sort_by        = "natural"
sort_sensitive = false
sort_reverse   = false
sort_dir_first = true
show_hidden    = true
show_symlink   = true

[preview]
tab_size        = 2
max_width       = 1000
max_height      = 1000
image_delay     = 30
wrap            = "yes"

[opener]
display = [ { run = 'kitten icat "$@"', desc = "display image" } ]
edit = [ { run = 'nvim "$@"', block = true, desc = "neovim" } ]
pdf = [ { run = 'zathura "$@"', detach = true, desc = "zathura" } ]

[open]
rules = [
    { url = "*.md", use = [ "edit" ] },
    { url = "*.{cpp,hpp,c,h}", use = [ "edit" ] },
    { url = "*.pdf", use = [ "pdf" ] },
    { mime = "text/*", use = [ "edit" ] },
    { mime = "image/*", use = [ "display" ] },
    { mime = "inode/directory", use = [ "edit" ] },
]

[plugin]
prepend_previewers = [
    { mime = "inode/directory", run = "eza-preview" },
    { mime = "application/*zip", run = "ouch" },
    { mime = "application/x-tar", run = "ouch" },
    { mime = "application/bzip2", run = "ouch" },
    { mime = "application/gzip", run = "ouch" },
    { mime = "application/x-7z-compressed", run = "ouch" },
    { mime = "application/x-rar", run = "ouch" },
    { mime = "application/xz", run = "ouch" },
]
append_previewers = [
    { url = "*", run = "file-extra-metadata" },
]
append_spotters = [
    { url = "*", run = "file-extra-metadata" },
]
