# Terminus Theme for Yazi (Synced with Kitty)
# Focuses on grayscale hierarchy, stealth borders, and minimal semantic colors.

# : Manager {{{

[manager]
cwd = { fg = "#eeeeee" } # foreground

# square borders
hovered = { reversed = true, bold = true }

# Find
find_keyword  = { fg = "#FCFCFC", bold = true, italic = true, underline = true } # white
find_position = { fg = "#888888", bg = "reset", bold = true, italic = true } # dark gray

# Marker
marker_copied   = { fg = "#D6D6D6", bg = "#D6D6D6" } # white
marker_cut      = { fg = "#1A1A1A", bg = "#1A1A1A" } # black
marker_marked   = { fg = "#AAAAAA", bg = "#AAAAAA" } # mid gray
marker_selected = { fg = "#4C4C4C", bg = "#4C4C4C" } # bright black

# Count
count_copied   = { fg = "#030303", bg = "#D6D6D6" } # background on white
count_cut      = { fg = "#eeeeee", bg = "#1A1A1A" } # foreground on black
count_selected = { fg = "#eeeeee", bg = "#4C4C4C" } # foreground on bright black

# Border
border_symbol = "│"
border_style  = { fg = "#4C4C4C" } # bright black (subtle border)

# : }}}

# : Indicator {{{

[indicator]
padding = { open = "▐", close = "▌" }

# : }}}

# : Tabs {{{

[tabs]
active   = { fg = "#030303", bg = "#4C4C4C", bold = true } # match kitty active tab
inactive = { fg = "#4C4C4C", bg = "#030303" } # match kitty inactive tab

# : }}}


# : Mode {{{

[mode]

# Normal mode (Main focus, subtle gray)
normal_main = { fg = "#030303", bg = "#888888", bold = true }
normal_alt  = { fg = "#888888", bg = "#1A1A1A" }

# Select mode (Lighter gray for contrast)
select_main = { fg = "#030303", bg = "#D6D6D6", bold = true }
select_alt  = { fg = "#D6D6D6", bg = "#1A1A1A" }

# Unset mode (Darkest contrast)
unset_main = { fg = "#eeeeee", bg = "#4C4C4C", bold = true }
unset_alt  = { fg = "#4C4C4C", bg = "#1A1A1A" }

# : }}}


# : Status bar {{{

[status]
# Permissions (Grayscale hierarchy)
perm_sep   = { fg = "#4C4C4C" }
perm_type  = { fg = "#AAAAAA" }
perm_read  = { fg = "#888888" }
perm_write = { fg = "#D6D6D6" }
perm_exec  = { fg = "#eeeeee" }

# Progress
progress_label  = { fg = "#eeeeee", bold = true }
progress_normal = { fg = "#888888", bg = "#1A1A1A" }
progress_error  = { fg = "#030303", bg = "#D6D6D6" }

# : }}}


# : Pick {{{

[pick]
border   = { fg = "#4C4C4C" }
active   = { fg = "#eeeeee", bold = true }
inactive = { fg = "#888888" }

# : }}}


# : Input {{{

[input]
border   = { fg = "#4C4C4C" }
title    = { fg = "#eeeeee" }
value    = { fg = "#eeeeee" }
selected = { reversed = true }

# : }}}


# : Completion {{{

[cmp]
border = { fg = "#4C4C4C" }

# : }}}


# : Tasks {{{

[tasks]
border  = { fg = "#4C4C4C" }
title   = { fg = "#eeeeee" }
hovered = { fg = "#eeeeee", bold = true }

# : }}}


# : Which {{{

[which]
mask            = { bg = "#030303" }
cand            = { fg = "#eeeeee" }
rest            = { fg = "#4C4C4C" }
desc            = { fg = "#888888" }
separator       = " -> "
separator_style = { fg = "#4C4C4C" }

# : }}}


# : Help {{{

[help]
on      = { fg = "#eeeeee" }
run     = { fg = "#888888" }
hovered = { reversed = true, bold = true }
footer  = { fg = "#030303", bg = "#eeeeee" }

# : }}}


# : Spotter {{{

[spot]
border   = { fg = "#4C4C4C" }
title    = { fg = "#eeeeee" }
tbl_col  = { fg = "#888888" }
tbl_cell = { fg = "#eeeeee", bg = "#1A1A1A" }

# : }}}


# : Notification {{{

[notify]
title_info  = { fg = "#eeeeee" }
title_warn  = { fg = "#AAAAAA" }
title_error = { fg = "#888888" }

# : }}}


# : File-specific styles {{{

[filetype]

rules = [
    # Monochromatic categorization based on importance
    { mime = "image/*", fg = "#AAAAAA" },
    { mime = "{audio,video}/*", fg = "#888888" },
    { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", fg = "#888888" },
    { mime = "application/{pdf,doc,rtf}", fg = "#D6D6D6" },
    { mime = "vfs/{absent,stale}", fg = "#4C4C4C" },
    { url = "*", fg = "#eeeeee" },
    { url = "*/", fg = "#AAAAAA", bold = true },
]

# : }}}

[icon]

dirs = [
    # All folder icons set to mid-gray for consistency
    { name = ".config", text = "", fg = "#888888" },
    { name = ".git", text = "", fg = "#888888" },
    { name = ".github", text = "", fg = "#888888" },
    { name = ".npm", text = "", fg = "#888888" },
    { name = "Desktop", text = "", fg = "#888888" },
    { name = "Development", text = "", fg = "#888888" },
    { name = "Documents", text = "", fg = "#888888" },
    { name = "Downloads", text = "", fg = "#888888" },
    { name = "Library", text = "", fg = "#888888" },
    { name = "Movies", text = "", fg = "#888888" },
    { name = "Music", text = "", fg = "#888888" },
    { name = "Pictures", text = "", fg = "#888888" },
    { name = "Public", text = "", fg = "#888888" },
    { name = "Videos", text = "", fg = "#888888" },
]
conds = [
    # Special files
    { if = "orphan", text = "", fg = "#4C4C4C" },
    { if = "link", text = "", fg = "#4C4C4C" },
    { if = "block", text = "", fg = "#AAAAAA" },
    { if = "char", text = "", fg = "#AAAAAA" },
    { if = "fifo", text = "", fg = "#AAAAAA" },
    { if = "sock", text = "", fg = "#AAAAAA" },
    { if = "sticky", text = "", fg = "#AAAAAA" },
    { if = "dummy", text = "", fg = "#4C4C4C" },

    # Fallback
    { if = "dir", text = "", fg = "#888888", bold = true },
    { if = "exec", text = "", fg = "#eeeeee" },
    { if = "!dir", text = "", fg = "#eeeeee" },
]
